name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="claude-lint-v${VERSION}-${TARGET}.tar.gz"

          cp "target/${TARGET}/release/claude-lint" .
          tar -czf "${ARCHIVE}" claude-lint
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-lint-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUMS="claude-lint-v${VERSION}-checksums.txt"

          cd artifacts
          find . -mindepth 2 -name '*.tar.gz' -exec mv {} . \;
          sha256sum claude-lint-*.tar.gz > "${CHECKSUMS}"
          echo "CHECKSUMS=${CHECKSUMS}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd artifacts
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            claude-lint-*.tar.gz \
            "claude-lint-v${VERSION}-checksums.txt"
